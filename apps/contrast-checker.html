<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contrast Checker – WCAG AA/AAA results.">
  <title>Contrast Checker | Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../apps/apps.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <nav class="top-nav" aria-label="Primary">
    <div class="nav-inner">
      <a href="../index.html">Portfolio</a>
      <a href="../apps.html">Mini Apps</a>
      <span aria-hidden="true">/</span>
      <span>Contrast Checker</span>
    </div>
  </nav>

  <main id="main" class="container" role="main">
    <header class="hero">
      <h1>Contrast Checker</h1>
      <p class="title">Compute contrast ratio and AA/AAA pass/fail for text.</p>
    </header>

    <section class="app-layout" aria-labelledby="tool-heading">
      <h2 id="tool-heading">Checker</h2>
      <div class="app-controls">
        <input id="fg" type="text" placeholder="#000000" style="width:140px; padding:8px 12px; border:1px solid var(--accent-border); border-radius:8px;">
        <input id="bg" type="text" placeholder="#ffffff" style="width:140px; padding:8px 12px; border:1px solid var(--accent-border); border-radius:8px;">
        <button class="btn" id="swap">Swap</button>
      </div>
      <div class="app-io">
        <div class="panel">
          <header>Results</header>
          <table class="kv-table" id="results"></table>
          <div class="meta" id="ratio-meta">—</div>
        </div>
        <div class="panel">
          <header>Preview</header>
          <div class="contrast-sample">
            <div id="preview" class="contrast-preview">Sample Text</div>
          </div>
          <div class="meta">AA: ≥4.5 (normal), AAA: ≥7.0</div>
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2024 Manoj (Manu) Palasamudram. Contrast Checker.</p>
    </footer>
  </main>

  <script src="./contrast-checker.js" defer></script>
</body>
</html>
