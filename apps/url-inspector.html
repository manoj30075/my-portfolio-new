<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="URL Inspector – parse URLs and query params.">
  <title>URL Inspector | Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../apps/apps.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <nav class="top-nav" aria-label="Primary">
    <div class="nav-inner">
      <a href="../index.html">Portfolio</a>
      <a href="../apps.html">Mini Apps</a>
      <span aria-hidden="true">/</span>
      <span>URL Inspector</span>
    </div>
  </nav>

  <main id="main" class="container" role="main">
    <header class="hero">
      <h1>URL Inspector</h1>
      <p class="title">Parse URLs into components and query params.</p>
    </header>

    <section class="app-layout" aria-labelledby="tool-heading">
      <h2 id="tool-heading">Inspector</h2>
      <div class="app-controls">
        <input id="url-input" type="text" placeholder="Enter URL…" style="flex:1; min-width:240px; padding:8px 12px; border:1px solid var(--accent-border); border-radius:8px;">
        <button class="btn" id="clear-url">Clear</button>
      </div>
      <div class="panel">
        <header>Components</header>
        <div class="content">
          <table class="kv-table" id="url-table" aria-live="polite"></table>
        </div>
        <div class="meta" id="url-meta">—</div>
      </div>
      <div class="panel">
        <header>Query Parameters</header>
        <div class="content">
          <table class="kv-table" id="params-table"></table>
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2024 Manoj (Manu) Palasamudram. URL Inspector.</p>
    </footer>
  </main>

  <script src="./url-inspector.js" defer></script>
</body>
</html>
