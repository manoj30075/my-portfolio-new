<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="JSON to TypeScript – infer TS interfaces from JSON.">
  <title>JSON → TypeScript | Mini App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../apps/apps.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <nav class="top-nav" aria-label="Primary">
    <div class="nav-inner">
      <a href="../index.html">Portfolio</a>
      <a href="../apps.html">Mini Apps</a>
      <span aria-hidden="true">/</span>
      <span>JSON → TypeScript</span>
    </div>
  </nav>

  <main id="main" class="container" role="main">
    <header class="hero">
      <h1>JSON → TypeScript</h1>
      <p class="title">Infer TypeScript interfaces from sample JSON.</p>
    </header>

    <section class="app-layout" aria-labelledby="tool-heading">
      <h2 id="tool-heading">Generator</h2>
      <div class="app-controls">
        <button class="btn primary" id="generate-btn">Generate</button>
        <button class="btn" id="copy-btn">Copy</button>
      </div>
      <div class="app-io">
        <div class="panel">
          <header>JSON</header>
          <textarea id="json-input" placeholder='Paste JSON here…'></textarea>
          <div class="meta" id="json-meta">Waiting for input…</div>
        </div>
        <div class="panel">
          <header>TypeScript</header>
          <pre id="ts-output" aria-live="polite"></pre>
          <div class="meta" id="ts-meta">—</div>
        </div>
      </div>
    </section>

    <footer>
      <p>&copy; 2024 Manoj (Manu) Palasamudram. JSON → TypeScript.</p>
    </footer>
  </main>

  <script src="./json-to-ts.js" defer></script>
</body>
</html>
